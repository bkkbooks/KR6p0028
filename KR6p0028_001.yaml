body:
  text: 菩薩戒弟子彭際清述釋此經時略開四分一明經中要領二明往生利益三別申問答四説偈回向是經以一心為宗以持名為行以信願為導以不退為程以阿耨多羅三藐三菩提為究竟云何以一心為宗唯此一心諸佛之本原衆生之慧命迷之故流浪三塗悟之故直登彼岸然迷悟雖殊而本來不動但離前塵虗妄相想光明洞然遍周沙界盡未來際無有間歇故號之曰無量光亦號之曰無量壽是知無量光壽不離衆生一切時中擬議不到處摸索不著處特患諸人當面錯過耳我釋迦尊慈悲方便指西方極樂普勸往生開闡念佛法門而以一心不亂為的所謂制心一處無事不辦念極情空本光自發云何以持名為行觀經云稱佛名故念念中除八十億劫生死之罪以名召德法報化三攝無不盡故文殊般若經專以持名為一行三昧但此衆生無始情塵如油入若非發勇猛心起精進行怠玩因循安能得入所以尅期取效自一日以至七日必至于一心而後已得此一心佛不異心心不異佛坐臥經行了無餘念隨其心淨則佛土淨轉娑婆成極樂只在當人非為分外云何以信願為導經云汝等皆當信受我語及諸佛所説信者信有三世信有西方淨土信一念念佛決定見佛由見佛故決定成佛是謂依他起信依他起信者其力淺信三世不離自心自心具足西方淨土信一念念佛是念即佛念念念佛無念不佛乃至離即離非頓見真如寂滅場地是名正信亦名淨信亦名具足信經云衆生聞者應當發願願生彼國願者願我離苦得樂願我舍穢得淨此是聲聞緣覺之因其願狹唯發無上菩提之心欲普令一切衆生離苦得樂欲普令一切衆生舍穢取淨是故雖生淨土而不舍娑婆雖處娑婆而願與衆生同生極樂是名正願亦名宏願亦名無上願具如是信如是願者斯能一門深入妙莊嚴路云何以不退為程經云衆生生者皆是阿跋致阿跋致此云不退此土修行多諸障難菩薩聲聞尚昧宿因忘失本願何況凡夫種少善根報盡還墮不依佛力勝果難圓大智度論云菩薩作是念我未得佛眼如盲無異若不為佛所導引則無所趣錯入餘道設聞佛法異處行者未知教化時節行法多少菩薩見佛或眼見心清淨若聞所説心則樂法得大智慧隨法修行而得解脫如是等值佛無量利益豈不一心求欲見佛又云菩薩不貴轉輪聖王人天福樂但念諸佛常善修念佛三昧故所生常值諸佛是知諸發心人欲決定成佛須常不離佛欲不離佛莫先念佛觀經云無量壽佛有八萬四千相一一相有八萬四千好一一好有八萬四千光明一一光明遍照十方世界念佛衆生攝取不舍是知佛光如鏡衆生如影對鏡之身影無不現故經云是諸人等皆得不退轉于阿耨多羅三藐三菩提以大光明中決無退緣故云何以阿耨多羅三藐三菩提為究竟阿耨多羅三藐三菩提此云無上正等正覺一切聲聞緣覺自謂已證涅槃終不希求佛果故華嚴會上無量法音無邊佛事不聞不見以不發菩提心故亦不令他住菩提心故佛説法四十九年多方淘汰至法華會上方傾盡本懷開權顯實諸大弟子悉蒙授記祇為此一乘法門難言難解故而善財童子已發大心遍參知識其卒也普賢以十大願王導歸極樂為欲圓滿普賢行願故究竟成佛故今以念佛因緣發心見佛以見佛故決定成佛視諸聲聞緣覺滯迹化城者日劫相倍不足云喻是知此經亦頓亦圓直與華嚴法華互相顯發只為究竟了無差別故明乎究竟之指方名受持是經方名信受諸佛所説方名供養十方如來成就慧身不由他悟本自非動何退之有右明此經要領竟次往生利益今當説彼佛國中無有衆苦者略説有四事一無胎獄苦託質蓮華故一無老病死衰苦壽命無量故一無鐵圍障礙苦十方佛國隨意往來故一不受輪回苦無三惡道故次明但受諸樂者略説有六事一眼根清淨衆寶光耀故一耳根清淨法皆宣流故一舌根清淨飽䬸上味故一鼻根清淨香華匝地故一身根清淨八水澡身故一意根清淨常念三寶故生彼國者更有五事勝餘佛國一阿彌陀佛常在説法故一阿彌陀佛化身無量故一阿彌陀佛光明遍照故一諸上善人俱會一處故一十方諸佛同心護念故如是之法得聞為難聞而信者難中之難以五濁惡世中但有衆苦無一可樂故又生值末法不見諸佛不聞説法故遇斯經者生珍重心生難遭想如説修行一生取辦斯為不負我佛説經之心及十方諸佛護念之指乃千生萬劫轉凡成聖一大機緣也可不勉哉右明往生利益竟別申問答約有四條以釋羣疑以堅衆信問清淨心中本無一物如是功德如是莊嚴何異揑目生華畫地作餅答本無一物者謂即相無相非謂一切斷滅六祖云世界虗空能含萬物色像日月星宿山河大地泉原溪澗草木叢林惡人善人惡法善法天堂地獄一切大海須彌諸山總在空中世人性空亦復如是故知了得性空則一切色像皆空功德莊嚴與鏡華水月等不了性空厭喧求寂縱能偏證涅槃祇是鈍阿羅漢問苦樂兩忘淨穢不二方契真如云何于中熾然取舍答水鳥樹林寶池珠網是諸佛淨願所成丘陵坑坎瓦礫荊棘是衆生染業所感智者了得性空猶有無始客塵煩惱須仗淨緣對治餘習見佛聞法證無生忍方堪隨類度生在凡夫地不求出離妄希聖證無有是處問臨命終時阿彌陀佛現在其前其分身普應邪抑唯識所現邪如云唯識是幻非真如曰分身離心無佛答華嚴經云佛身充滿于法界普現一切衆生前隨緣赴感靡不周而恆處此菩提座以普現故可説分身以隨緣故亦成唯識故解脫長者云彼諸如來不來至此我身亦不往詣于彼不來不去來去宛然法性圓融不可思議問六祖謂東方人念佛求生西方西方人念佛求生何國凡愚不了自性不識身中淨土願東願西悟人在處一般古德誠言豈可不信答此乃一期掃蕩之談未合圓指謂西方人往生何國者同居念佛生方便土方便念佛生實報土實報念佛生寂光土故知一念佛門豎窮四土達本之人覓心尚不可得豈可于幻化身中別求淨土若了此不可得心遍一切處乘願往生如空印空何礙之有右別申問答竟繫以偈言普與見聞一心回向善哉釋迦文現身五濁世説此難信法橫截生死流善哉無量壽國土妙莊嚴普放大光明攝受無邊衆聞名能受持決定生彼國自致不退轉獲無上菩提靈鷲及王宮普勸生淨土此在祇樹園不問而自説良由大慈悲如救焚拯溺云何聞是法不生希有想長劫受輪回何由得出離我今依了義開闡修多羅十方婆伽婆唯此一心作念佛便成佛何異影與形普勸諸佛子信此誠實言如説勤修行燈燈遞相續金臺最上品于中而受生還來度有情究竟成佛道
